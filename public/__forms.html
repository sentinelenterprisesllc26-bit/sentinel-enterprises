<!-- Static form definitions for Netlify build-time detection -->
<!-- This file is not rendered to users — it only exists for Netlify's build bot -->
<html>
  <body>
    <form name="caregiver-checklist" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="caregiver-checklist" />
      <input name="email" type="email" />
      <input name="bot-field" />
    </form>

    <form name="crypto-checklist" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="crypto-checklist" />
      <input name="email" type="email" />
      <input name="bot-field" />
    </form>

    <form name="sentinel-squad-notify" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="sentinel-squad-notify" />
      <input name="email" type="email" />
      <input name="bot-field" />
    </form>

    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="name" />
      <input name="email" type="email" />
      <select name="person-type"></select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
